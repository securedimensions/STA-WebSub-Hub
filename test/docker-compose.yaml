networks:
  WebSubHubTest:
    driver: bridge

volumes:
  postgres_data:

services:
  db-test:
    image: postgres:14.2
    restart: no
    networks:
      - WebSubHubTest
    environment:
      - "POSTGRES_USER=websub"
      - "POSTGRES_PASSWORD=changeme"
      - "POSTGRES_DB=websub"
    expose:
      - "5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U websub -d websub"]
      interval: 5s
      timeout: 3s
      retries: 3

  broker-test:
    image: eclipse-mosquitto
    restart: no
    networks:
      - WebSubHubTest
    expose:
      - "1883"
    volumes:
      - ./config:/mosquitto/config:rw

  redis-test:
    image: redis:7-alpine
    restart: no
    networks:
      - WebSubHubTest
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  publisher-test:
    build:
      context: ../test/publisher
      dockerfile: Dockerfile
    restart: no
    networks:
      - WebSubHubTest
    environment:
      - "PUBLISHER_PORT=8181"
      - "PUBLISHER_LOG_LEVEL=DEBUG"
      - "HUB_URL=http://hub-api-test:4000/api/subscriptions"
      - "STA_ROOT_URL=http://publisher-test"
      - "STA_MQTT_URL=mqtt://broker-test:1883"
    expose:
      - "8181"
    depends_on:
      broker-test:
        condition: service_started

  subscriber-test:
    build:
      context: ../test/subscriber
      dockerfile: Dockerfile
    restart: no
    networks:
      - WebSubHubTest
    environment:
      - "SUBSCRIBER_PORT=8081"
      - "SUBSCRIBER_LOG_LEVEL=DEBUG"
    expose:
      - "8081"

  hub-api-test:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: no
    networks:
      - WebSubHubTest
    environment:
      - "POSTGRES_HOST=db-test"
      - "POSTGRES_PORT=5432"
      - "POSTGRES_USER=websub"
      - "POSTGRES_PASSWORD=changeme"
      - "POSTGRES_DB=websub"
      - "HUB_PORT=4000"
      - "HUB_LOG_LEVEL=INFO"
      - "HUB_URL=http://hub-api-test:4000/api/subscriptions"
      - "STA_ROOT_URL=http://publisher-test/"
      - "STA_MQTT_URL=mqtt://broker-test:1883"
      - "PUBLISHER_URL=http://publisher-test:8181"
      - "REDIS_URL=redis://redis-test:6379"
      - "HUB_MODE=api"
      - "HUB_STATS_INTERVAL_MS=0"
      - "CALLBACK_ALLOW_INSECURE_HTTP=true"
      - "CALLBACK_ALLOW_PRIVATE_NETS=true"
      - "HUB_OPS_TOKEN=test-ops-token"
      - "HUB_SECRET_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    expose:
      - "4000"
    depends_on:
      broker-test:
        condition: service_started
      redis-test:
        condition: service_healthy
      publisher-test:
        condition: service_started
      subscriber-test:
        condition: service_started
      db-test:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          node -e "
            const h = require('http');
            h.get({
              hostname: 'localhost',
              port: 4000,
              path: '/ops/health',
              headers: { 'x-ops-token': 'test-ops-token' }
            }, r => process.exit(r.statusCode === 200 ? 0 : 1))
             .on('error', () => process.exit(1));
          "
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  hub-ingest-test:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: no
    networks:
      - WebSubHubTest
    environment:
      - "POSTGRES_HOST=db-test"
      - "POSTGRES_PORT=5432"
      - "POSTGRES_USER=websub"
      - "POSTGRES_PASSWORD=changeme"
      - "POSTGRES_DB=websub"
      - "HUB_LOG_LEVEL=INFO"
      - "STA_ROOT_URL=http://publisher-test/"
      - "STA_MQTT_URL=mqtt://broker-test:1883"
      - "REDIS_URL=redis://redis-test:6379"
      - "HUB_MODE=ingest"
      - "HUB_STATS_INTERVAL_MS=0"
    depends_on:
      broker-test:
        condition: service_started
      redis-test:
        condition: service_healthy
      db-test:
        condition: service_healthy

  hub-delivery-test:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: no
    networks:
      - WebSubHubTest
    environment:
      - "POSTGRES_HOST=db-test"
      - "POSTGRES_PORT=5432"
      - "POSTGRES_USER=websub"
      - "POSTGRES_PASSWORD=changeme"
      - "POSTGRES_DB=websub"
      - "HUB_LOG_LEVEL=INFO"
      - "STA_ROOT_URL=http://publisher-test/"
      - "STA_MQTT_URL=mqtt://broker-test:1883"
      - "REDIS_URL=redis://redis-test:6379"
      - "HUB_MODE=delivery"
      - "HUB_STATS_INTERVAL_MS=0"
      - "CALLBACK_ALLOW_INSECURE_HTTP=true"
      - "CALLBACK_ALLOW_PRIVATE_NETS=true"
    depends_on:
      redis-test:
        condition: service_healthy
      db-test:
        condition: service_healthy

  test-runner:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["npm", "test"]
    restart: no
    networks:
      - WebSubHubTest
    environment:
      - "POSTGRES_HOST=db-test"
      - "POSTGRES_PORT=5432"
      - "POSTGRES_USER=websub"
      - "POSTGRES_PASSWORD=changeme"
      - "POSTGRES_DB=websub"
      - "HUB_PORT=4000"
      - "HUB_URL=http://hub-api-test:4000/api/subscriptions"
      - "STA_ROOT_URL=http://publisher-test/"
      - "REDIS_URL=redis://redis-test:6379"
      - "HUB_OPS_TOKEN=test-ops-token"
      - "HUB_SECRET_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      - "SUBSCRIBER_URL=http://subscriber-test:8081"
    depends_on:
      hub-api-test:
        condition: service_healthy
      hub-ingest-test:
        condition: service_started
      hub-delivery-test:
        condition: service_started
