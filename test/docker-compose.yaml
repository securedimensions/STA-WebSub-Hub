services:
  db:
    image: postgres:14.2
    restart: no
    environment:
      - "POSTGRES_HOST=db"
      - "POSTGRES_PORT=5432"
      - "POSTGRES_USER=websub"
      - "POSTGRES_PASSWORD=changeme"
      - "POSTGRES_DB=websub"
    expose:
      - "5432"
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -h db -p 5432 -U websub -d websub'"]
      interval: 5s
      timeout: 3s
      retries: 3
  broker:
    image: eclipse-mosquitto
    environment:
      - MQTT_PORT=1883
    expose:
      - "1883"
    ports:
      - "1883:1883"
    volumes:
      - ./config:/mosquitto/config:rw
    restart: no
  redis:
    image: redis:7-alpine
    restart: no
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    expose:
      - "6379"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
  publisher:
    build: 
      context: ../test/publisher
      dockerfile: Dockerfile
    restart: no
    environment:
      - "PUBLISHER_PORT=8181"
      - "PUBLISHER_LOG_LEVEL=DEBUG"
      - "HUB_URL=http://localhost:4000/api/subscriptions"
      - "STA_ROOT_URL=http://publisher"
      - "STA_MQTT_URL=mqtt://broker:1883"
    ports:
      - "8181:8181"
    depends_on:
      broker:
        condition: service_started
  subscriber:
    build: 
      context: ../test/subscriber
      dockerfile: Dockerfile
    restart: no
    environment:
      - "SUBSCRIBER_PORT=8081"
      - "SUBSCRIBER_LOG_LEVEL=DEBUG"
    ports:
      - "8081:8081"
  hub-api:
    build: 
      context: ..
      dockerfile: Dockerfile
    restart: no
    environment:
      - "POSTGRES_HOST=db"
      - "POSTGRES_PORT=5432"
      - "POSTGRES_USER=websub"
      - "POSTGRES_PASSWORD=changeme"
      - "POSTGRES_DB=websub"
      - "HUB_PORT=${HUB_PORT:-4000}"
      - "HUB_LOG_LEVEL=DEBUG"
      - "HUB_URL=http://localhost:${HUB_PORT:-4000}/api/subscriptions"
      - "STA_ROOT_URL=http://publisher/"
      - "STA_MQTT_URL=mqtt://broker:1883"
      - "PUBLISHER_URL=http://publisher:8181"
      - "REDIS_URL=redis://redis:6379"
      - "HUB_MODE=api"
      - "HUB_STATS_INTERVAL_MS=1000"
      - "CALLBACK_ALLOW_INSECURE_HTTP=true"
      - "CALLBACK_ALLOW_PRIVATE_NETS=true"
      - "HUB_OPS_TOKEN=test-ops-token"
      - "HUB_SECRET_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    ports:
      - "${HUB_PORT:-4000}:${HUB_PORT:-4000}"
    depends_on:
      broker:
        condition: service_started
      redis:
        condition: service_healthy
      publisher:
        condition: service_started
      subscriber:
        condition: service_started
      db:
        condition: service_healthy
  hub-ingest:
    build: 
      context: ..
      dockerfile: Dockerfile
    restart: no
    environment:
      - "POSTGRES_HOST=db"
      - "POSTGRES_PORT=5432"
      - "POSTGRES_USER=websub"
      - "POSTGRES_PASSWORD=changeme"
      - "POSTGRES_DB=websub"
      - "HUB_LOG_LEVEL=DEBUG"
      - "STA_ROOT_URL=http://publisher/"
      - "STA_MQTT_URL=mqtt://broker:1883"
      - "REDIS_URL=redis://redis:6379"
      - "HUB_MODE=ingest"
      - "HUB_STATS_INTERVAL_MS=1000"
      - "HUB_OPS_PORT=4001"
    depends_on:
      broker:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
  hub-delivery:
    build: 
      context: ..
      dockerfile: Dockerfile
    restart: no
    environment:
      - "POSTGRES_HOST=db"
      - "POSTGRES_PORT=5432"
      - "POSTGRES_USER=websub"
      - "POSTGRES_PASSWORD=changeme"
      - "POSTGRES_DB=websub"
      - "HUB_LOG_LEVEL=DEBUG"
      - "STA_ROOT_URL=http://publisher/"
      - "STA_MQTT_URL=mqtt://broker:1883"
      - "REDIS_URL=redis://redis:6379"
      - "HUB_MODE=delivery"
      - "HUB_STATS_INTERVAL_MS=1000"
      - "HUB_OPS_PORT=4002"
      - "CALLBACK_ALLOW_INSECURE_HTTP=true"
      - "CALLBACK_ALLOW_PRIVATE_NETS=true"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
volumes:
  postgres_data: