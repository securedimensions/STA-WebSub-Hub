services:
  sta-websub-hub-redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 1gb --maxmemory-policy noeviction
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - WebSubHub
  sta-websub-hub-db:
    image: postgres:14.2
    restart: always
    env_file:
      - ./.env
    expose:
      - ${POSTGRES_PORT}
    volumes:
      - ./create.sql:/docker-entrypoint-initdb.d/create.sql
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - WebSubHub
  sta-websub-hub-api:
    build: 
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - "HUB_PORT=$HUB_PORT"
      - "HUB_LOG_LEVEL=$HUB_LOG_LEVEL"
      - "HUB_URL=$HUB_URL"
      - "PUBLISHER_URL=$PUBLISHER_URL"
      - "STA_ROOT_URL=$STA_ROOT_URL"
      - "STA_MQTT_URL=$STA_MQTT_URL"
      - "REDIS_URL=redis://sta-websub-hub-redis:6379"
      - "HUB_MODE=api"
      - "HUB_STATS_INTERVAL_MS=1000"
    ports:
      - "$HUB_PORT:$HUB_PORT"
    depends_on:
      sta-websub-hub-redis:
        condition: service_healthy
      sta-websub-hub-db:
        condition: service_healthy
    networks:
      - WebSubHub
  sta-websub-hub-ingest:
    build: 
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - "HUB_LOG_LEVEL=$HUB_LOG_LEVEL"
      - "STA_ROOT_URL=$STA_ROOT_URL"
      - "STA_MQTT_URL=$STA_MQTT_URL"
      - "REDIS_URL=redis://sta-websub-hub-redis:6379"
      - "HUB_MODE=ingest"
      - "HUB_STATS_INTERVAL_MS=1000"
      - "HUB_OPS_PORT=${HUB_INGEST_OPS_PORT:-4001}"
    depends_on:
      sta-websub-hub-redis:
        condition: service_healthy
      sta-websub-hub-db:
        condition: service_healthy
    networks:
      - WebSubHub
  sta-websub-hub-delivery:
    build: 
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - "HUB_LOG_LEVEL=$HUB_LOG_LEVEL"
      - "STA_ROOT_URL=$STA_ROOT_URL"
      - "STA_MQTT_URL=$STA_MQTT_URL"
      - "REDIS_URL=redis://sta-websub-hub-redis:6379"
      - "HUB_MODE=delivery"
      - "HUB_STATS_INTERVAL_MS=1000"
      - "HUB_OPS_PORT=${HUB_DELIVERY_OPS_PORT:-4002}"
    depends_on:
      sta-websub-hub-redis:
        condition: service_healthy
      sta-websub-hub-db:
        condition: service_healthy
    networks:
      - WebSubHub
  sta-websub-hub-cleanup:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cleanup
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - "HUB_LOG_LEVEL=$HUB_LOG_LEVEL"
      - "POSTGRES_HOST=sta-websub-hub-db"
      - "REDIS_URL=redis://sta-websub-hub-redis:6379"
      - "CLEANUP_CRON_SCHEDULE=${CLEANUP_CRON_SCHEDULE:-*/30 * * * *}"
    depends_on:
      sta-websub-hub-redis:
        condition: service_healthy
      sta-websub-hub-db:
        condition: service_healthy
    networks:
      - WebSubHub
volumes:
  postgres_data:
networks:
  WebSubHub:
    name: WebSub-Hub
